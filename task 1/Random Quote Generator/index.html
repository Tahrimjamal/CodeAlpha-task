<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,500&family=Source+Sans+Pro:wght@400;600&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-main: #1a1a2e;
      --bg-card: #16213e;
      --text-quote: #eaeaea;
      --text-author: #7f8c8d;
      --accent: #e94560;
      --accent-hover: #ff6b6b;
    }

    body {
      min-height: 100vh;
      background: var(--bg-main);
      background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 50%, #1a1a2e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Source Sans Pro', sans-serif;
      padding: 20px;
    }

    .container {
      max-width: 680px;
      width: 100%;
      background: var(--bg-card);
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '"';
      position: absolute;
      top: -20px;
      left: 30px;
      font-family: 'Playfair Display', serif;
      font-size: 180px;
      color: rgba(233, 69, 96, 0.08);
      line-height: 1;
      pointer-events: none;
    }

    .quote-content {
      position: relative;
      z-index: 1;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .quote-content.fade-out {
      opacity: 0;
    }

    #quote-text {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-style: italic;
      color: var(--text-quote);
      line-height: 1.6;
      margin-bottom: 24px;
      position: relative;
    }

    #quote-text::before {
      content: '"';
      color: var(--accent);
      font-size: 48px;
      line-height: 0;
      margin-right: 8px;
      font-style: normal;
    }

    #quote-author {
      font-size: 18px;
      color: var(--text-author);
      font-weight: 400;
      margin-bottom: 36px;
    }

    #new-quote-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 36px;
      font-family: 'Source Sans Pro', sans-serif;
      font-size: 16px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    #new-quote-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
    }

    #new-quote-btn:active {
      transform: scale(0.98);
    }

    @media (max-width: 600px) {
      .container {
        padding: 32px 24px;
      }

      #quote-text {
        font-size: 22px;
      }

      .container::before {
        font-size: 120px;
        left: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="quote-content" id="quote-content">
      <p id="quote-text"></p>
      <p id="quote-author"></p>
    </div>
    <button id="new-quote-btn">New Quote</button>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" },
      { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
      { text: "Your time is limited, don't waste it living someone else's life.", author: "Steve Jobs" },
      { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
      { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
      { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair" },
      { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau" },
      { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller" },
      { text: "I find that the harder I work, the more luck I seem to have.", author: "Thomas Jefferson" },
      { text: "Success is walking from failure to failure with no loss of enthusiasm.", author: "Winston Churchill" },
      { text: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
      { text: "Don't let yesterday take up too much of today.", author: "Will Rogers" },
      { text: "You learn more from losing than winning. The losers analyze what went wrong and figure out how to fix it for next time.", author: "Robin Sharma" },
      { text: "The only person you are destined to become is the person you decide to be.", author: "Ralph Waldo Emerson" },
      { text: "Knowing is not enough; we must apply. Willing is not enough; we must do.", author: "Johann Wolfgang von Goethe" },
      { text: "We generate fears while we sit. We overcome them by action.", author: "Dr. Henry Link" },
      { text: "Whether you think you can or think you can't, you're right.", author: "Henry Ford" },
      { text: "The mind is everything. What you think you become.", author: "Buddha" }
    ];

    let lastQuoteIndex = -1;

    const quoteTextEl = document.getElementById('quote-text');
    const quoteAuthorEl = document.getElementById('quote-author');
    const quoteContentEl = document.getElementById('quote-content');
    const newQuoteBtn = document.getElementById('new-quote-btn');

    function getRandomQuote() {
      let randomIndex;
      do {
        randomIndex = Math.floor(Math.random() * quotes.length);
      } while (randomIndex === lastQuoteIndex && quotes.length > 1);
      
      lastQuoteIndex = randomIndex;
      return quotes[randomIndex];
    }

    function displayQuote() {
      quoteContentEl.classList.add('fade-out');
      
      setTimeout(() => {
        const quote = getRandomQuote();
        quoteTextEl.textContent = quote.text;
        quoteAuthorEl.textContent = '— ' + quote.author;
        quoteContentEl.classList.remove('fade-out');
      }, 400);
    }

    displayQuote();

    newQuoteBtn.addEventListener('click', displayQuote);
  </script>
</body>
</html>
