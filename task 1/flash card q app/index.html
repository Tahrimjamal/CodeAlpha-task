<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashMind - Flashcard Quiz App</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            color: #fff;
            padding: 24px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 32px;
            font-weight: 700;
            color: #e94560;
            letter-spacing: 1px;
        }

        .card-counter {
            text-align: center;
            font-size: 14px;
            color: #533483;
            margin-bottom: 16px;
            min-height: 20px;
        }

        .flashcard-container {
            perspective: 1000px;
            margin-bottom: 24px;
            min-height: 280px;
        }

        .flashcard {
            position: relative;
            width: 100%;
            min-height: 250px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.6s ease;
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            min-height: 250px;
            backface-visibility: hidden;
            border-radius: 16px;
            background: #fefefe;
            border: 3px solid #e94560;
            box-shadow: 0 10px 40px rgba(233, 69, 96, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .card-front {
            transform: rotateY(0deg);
        }

        .card-back {
            transform: rotateY(180deg);
        }

        .card-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #533483;
            margin-bottom: 16px;
        }

        .card-content {
            font-size: 24px;
            font-weight: 500;
            color: #16213e;
            text-align: center;
            word-break: break-word;
        }

        .show-answer-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .show-answer-btn:hover {
            background: #ff6b6b;
            transform: scale(1.05);
        }

        .navigation {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .nav-btn {
            padding: 12px 32px;
            background: #533483;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-btn:hover:not(:disabled) {
            background: #6b44a8;
            transform: scale(1.05);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .crud-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(233, 69, 96, 0.3);
        }

        .crud-panel h2 {
            font-size: 18px;
            color: #e94560;
            margin-bottom: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            color: #ccc;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: #16213e;
            border: 2px solid #533483;
            border-radius: 8px;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            transition: border-color 0.2s ease;
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #e94560;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .form-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .form-btn.primary {
            background: #00d9a5;
            color: #16213e;
        }

        .form-btn.primary:hover {
            background: #00f0b5;
            transform: scale(1.05);
        }

        .form-btn.danger {
            background: #ff4757;
            color: #fff;
        }

        .form-btn.danger:hover {
            background: #ff6b7a;
            transform: scale(1.05);
        }

        .form-btn.secondary {
            background: #533483;
            color: #fff;
        }

        .form-btn.secondary:hover {
            background: #6b44a8;
            transform: scale(1.05);
        }

        .form-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #533483;
        }

        .empty-state p {
            font-size: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .flashcard-container:not(.empty-state) .flashcard {
            animation: fadeIn 0.3s ease;
        }

        .edit-actions {
            display: none;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .edit-actions.visible {
            display: flex;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>FlashMind</h1>
        </header>

        <div class="card-counter" id="cardCounter"></div>

        <div class="flashcard-container" id="flashcardContainer">
            <div class="empty-state" id="emptyState">
                <p>No flashcards yet. Add your first card below!</p>
            </div>
            <div class="flashcard" id="flashcard" style="display: none;">
                <div class="card-face card-front">
                    <span class="card-label">Question</span>
                    <div class="card-content" id="questionText"></div>
                    <button class="show-answer-btn" id="showAnswerBtn">Show Answer</button>
                </div>
                <div class="card-face card-back">
                    <span class="card-label">Answer</span>
                    <div class="card-content" id="answerText"></div>
                </div>
            </div>
        </div>

        <div class="navigation" id="navigation" style="display: none;">
            <button class="nav-btn" id="prevBtn">← Previous</button>
            <button class="nav-btn" id="nextBtn">Next →</button>
        </div>

        <div class="crud-panel">
            <h2 id="formTitle">Add New Flashcard</h2>
            <form id="cardForm">
                <div class="form-group">
                    <label for="questionInput">Question</label>
                    <input type="text" id="questionInput" placeholder="Enter your question..." required>
                </div>
                <div class="form-group">
                    <label for="answerInput">Answer</label>
                    <textarea id="answerInput" placeholder="Enter the answer..." required></textarea>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="form-btn primary" id="addBtn">Add Card</button>
                </div>
                <div class="edit-actions" id="editActions">
                    <button type="button" class="form-btn danger" id="deleteBtn">Delete</button>
                    <button type="button" class="form-btn secondary" id="cancelEditBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'flashcard_data';

        const defaultCards = [
            { id: 1700000001, question: 'What is the capital of France?', answer: 'Paris' },
            { id: 1700000002, question: 'What is 2 + 2?', answer: '4' },
            { id: 1700000003, question: 'HTML stands for?', answer: 'HyperText Markup Language' }
        ];

        let cards = [];
        let currentIndex = 0;
        let isFlipped = false;
        let editingCardId = null;

        const emptyState = document.getElementById('emptyState');
        const flashcardEl = document.getElementById('flashcard');
        const questionTextEl = document.getElementById('questionText');
        const answerTextEl = document.getElementById('answerText');
        const cardCounterEl = document.getElementById('cardCounter');
        const navigationEl = document.getElementById('navigation');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const questionInput = document.getElementById('questionInput');
        const answerInput = document.getElementById('answerInput');
        const cardForm = document.getElementById('cardForm');
        const addBtn = document.getElementById('addBtn');
        const editActions = document.getElementById('editActions');
        const deleteBtn = document.getElementById('deleteBtn');
        const cancelEditBtn = document.getElementById('cancelEditBtn');
        const formTitle = document.getElementById('formTitle');

        function loadCards() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                cards = JSON.parse(stored);
            } else {
                cards = [...defaultCards];
                saveCards();
            }
        }

        function saveCards() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
        }

        function updateUI() {
            if (cards.length === 0) {
                emptyState.style.display = 'block';
                flashcardEl.style.display = 'none';
                navigationEl.style.display = 'none';
                cardCounterEl.textContent = '';
                editActions.classList.remove('visible');
                return;
            }

            emptyState.style.display = 'none';
            flashcardEl.style.display = 'block';
            navigationEl.style.display = 'flex';

            if (!isFlipped) {
                flashcardEl.classList.remove('flipped');
                showAnswerBtn.style.display = 'block';
            } else {
                flashcardEl.classList.add('flipped');
                showAnswerBtn.style.display = 'none';
            }

            const card = cards[currentIndex];
            questionTextEl.textContent = card.question;
            answerTextEl.textContent = card.answer;

            cardCounterEl.textContent = `Card ${currentIndex + 1} of ${cards.length}`;

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === cards.length - 1;

            if (editingCardId) {
                addBtn.textContent = 'Save Changes';
                formTitle.textContent = 'Edit Flashcard';
                editActions.classList.add('visible');
            } else {
                addBtn.textContent = 'Add Card';
                formTitle.textContent = 'Add New Flashcard';
                editActions.classList.remove('visible');
            }
        }

        function flipCard() {
            if (cards.length === 0) return;
            isFlipped = !isFlipped;
            if (isFlipped) {
                flashcardEl.classList.add('flipped');
                showAnswerBtn.style.display = 'none';
            } else {
                flashcardEl.classList.remove('flipped');
                showAnswerBtn.style.display = 'block';
            }
        }

        function navigate(direction) {
            if (cards.length === 0) return;
            if (direction === 'next' && currentIndex < cards.length - 1) {
                currentIndex++;
            } else if (direction === 'prev' && currentIndex > 0) {
                currentIndex--;
            }
            isFlipped = false;
            updateUI();
        }

        function addCard(question, answer) {
            const newCard = {
                id: Date.now(),
                question: question.trim(),
                answer: answer.trim()
            };
            cards.push(newCard);
            currentIndex = cards.length - 1;
            saveCards();
        }

        function startEdit() {
            if (cards.length === 0) return;
            const card = cards[currentIndex];
            editingCardId = card.id;
            questionInput.value = card.question;
            answerInput.value = card.answer;
            updateUI();
        }

        function saveEdit() {
            if (!editingCardId) return;
            const cardIndex = cards.findIndex(c => c.id === editingCardId);
            if (cardIndex !== -1) {
                cards[cardIndex].question = questionInput.value.trim();
                cards[cardIndex].answer = answerInput.value.trim();
                saveCards();
            }
            cancelEdit();
        }

        function cancelEdit() {
            editingCardId = null;
            questionInput.value = '';
            answerInput.value = '';
            updateUI();
        }

        function deleteCard() {
            if (cards.length === 0) return;
            if (!confirm('Are you sure you want to delete this flashcard?')) return;

            cards.splice(currentIndex, 1);

            if (cards.length === 0) {
                currentIndex = 0;
            } else if (currentIndex >= cards.length) {
                currentIndex = cards.length - 1;
            }

            isFlipped = false;
            saveCards();
            updateUI();
        }

        showAnswerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            flipCard();
        });

        flashcardEl.addEventListener('click', flipCard);

        prevBtn.addEventListener('click', () => navigate('prev'));
        nextBtn.addEventListener('click', () => navigate('next'));

        cardForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const question = questionInput.value.trim();
            const answer = answerInput.value.trim();

            if (!question || !answer) return;

            if (editingCardId) {
                saveEdit();
            } else {
                addCard(question, answer);
                questionInput.value = '';
                answerInput.value = '';
            }
        });

        deleteBtn.addEventListener('click', deleteCard);
        cancelEditBtn.addEventListener('click', cancelEdit);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') navigate('prev');
            if (e.key === 'ArrowRight') navigate('next');
            if (e.key === ' ' && cards.length > 0) {
                e.preventDefault();
                flipCard();
            }
        });

        loadCards();
        updateUI();
    </script>
</body>
</html>
